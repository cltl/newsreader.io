<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem 1rem; line-height: 1.6; color: #222; }
    nav { margin-bottom: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 1rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #0366d6; }
    img { max-width: 100%; height: auto; }
    table { border-collapse: collapse; }
    table, th, td { border: 1px solid #ddd; padding: 0.4rem 0.6rem; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #ddd; color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/blog/' | relative_url }}">News</a>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>{{ site.title }} &mdash; archived static export.</p>
  </footer>
</body>
</html>
